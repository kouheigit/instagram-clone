server {
    listen 80;
    server_name localhost;

    client_max_body_size 210M;  # 動画アップロード最大200MB (POST-02)

    # セキュリティヘッダー
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ヘルスチェック (Kubernetes Liveness/Readiness Probe対応)
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # --- user-service (port 8001) ---
    location /api/v1/users/ {
        limit_req zone=auth burst=50 nodelay;
        proxy_pass http://user_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/auth/ {
        limit_req zone=anon burst=20 nodelay;
        proxy_pass http://user_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # --- post-service (port 8002) ---
    location /api/v1/posts/ {
        limit_req zone=auth burst=30 nodelay;
        proxy_pass http://post_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # --- feed-service (port 8003) ---
    location /api/v1/feed/ {
        limit_req zone=auth burst=50 nodelay;
        proxy_pass http://feed_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # リールフィード
    location /api/v1/reels/ {
        limit_req zone=auth burst=30 nodelay;
        proxy_pass http://feed_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # --- story-service (port 8005) ---
    location /api/v1/stories/ {
        limit_req zone=auth burst=30 nodelay;
        proxy_pass http://story_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # --- notification-service (port 8008) ---
    location /api/v1/notifications/ {
        limit_req zone=auth burst=30 nodelay;
        proxy_pass http://notification_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # --- media-service (port 8004) ---
    location /api/v1/media/ {
        limit_req zone=auth burst=10 nodelay;
        client_max_body_size 210M;
        proxy_pass http://media_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # --- search-service (port 8006) ---
    location /api/v1/search/ {
        limit_req zone=auth burst=50 nodelay;
        proxy_pass http://search_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # --- dm-service (port 8007) ---
    location /api/v1/dm/ {
        limit_req zone=auth burst=30 nodelay;
        proxy_pass http://dm_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # メディアファイル配信
    location /media/ {
        alias /var/media/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # エラーページ
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
