server {
    listen 80;
    server_name localhost;

    client_max_body_size 210M;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    location /api/v1/users/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }
        limit_req zone=auth burst=50 nodelay;
        proxy_pass http://user_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/auth/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }
        limit_req zone=anon burst=20 nodelay;
        proxy_pass http://user_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/posts/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }
        limit_req zone=auth burst=30 nodelay;
        proxy_pass http://post_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/feed/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }
        limit_req zone=auth burst=50 nodelay;
        proxy_pass http://feed_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/reels/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }
        limit_req zone=auth burst=30 nodelay;
        proxy_pass http://feed_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/stories/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }
        limit_req zone=auth burst=30 nodelay;
        proxy_pass http://story_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/notifications/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }
        limit_req zone=auth burst=30 nodelay;
        proxy_pass http://notification_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/media/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }
        limit_req zone=auth burst=10 nodelay;
        client_max_body_size 110M;
        proxy_pass http://media_service;
        include /etc/nginx/conf.d/proxy_params.conf;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /api/v1/search/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }
        limit_req zone=auth burst=50 nodelay;
        proxy_pass http://search_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/dm/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }
        limit_req zone=auth burst=30 nodelay;
        proxy_pass http://dm_service;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /media/ {
        alias /var/media/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
        add_header Accept-Ranges bytes;
        # 動画ストリーミング用 Range Request サポート
        mp4;
        mp4_buffer_size     1m;
        mp4_max_buffer_size 5m;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
