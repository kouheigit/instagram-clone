user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ログフォーマット
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip圧縮
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # レートリミット設定 (要件定義: 未認証100/min、認証済み500/min)
    limit_req_zone $binary_remote_addr zone=anon:10m rate=100r/m;
    limit_req_zone $http_authorization zone=auth:10m rate=500r/m;
    limit_req_zone $binary_remote_addr zone=api_client:10m rate=5000r/m;

    # アップストリーム定義
    upstream user_service {
        server user-service:8001;
        keepalive 32;
    }

    upstream post_service {
        server post-service:8002;
        keepalive 32;
    }

    upstream feed_service {
        server feed-service:8003;
        keepalive 32;
    }

    upstream story_service {
        server story-service:8005;
        keepalive 32;
    }

    upstream notification_service {
        server notification-service:8008;
        keepalive 32;
    }

    upstream media_service {
        server media-service:8004;
        keepalive 32;
    }

    upstream search_service {
        server search-service:8006;
        keepalive 32;
    }

    upstream dm_service {
        server dm-service:8007;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
