global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:8001"]
    metrics_path: /metrics/

  - job_name: "post-service"
    static_configs:
      - targets: ["post-service:8002"]
    metrics_path: /metrics/

  - job_name: "feed-service"
    static_configs:
      - targets: ["feed-service:8003"]
    metrics_path: /metrics/

  - job_name: "story-service"
    static_configs:
      - targets: ["story-service:8005"]
    metrics_path: /metrics/

  - job_name: "notification-service"
    static_configs:
      - targets: ["notification-service:8008"]
    metrics_path: /metrics/

  - job_name: "media-service"
    static_configs:
      - targets: ["media-service:8004"]
    metrics_path: /metrics/

  - job_name: "search-service"
    static_configs:
      - targets: ["search-service:8006"]
    metrics_path: /metrics/

  - job_name: "dm-service"
    static_configs:
      - targets: ["dm-service:8007"]
    metrics_path: /metrics/
